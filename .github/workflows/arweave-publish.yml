# Publishes a UTF-8 Markdown bundle of the spec to Arweave (arweave.net).
#
# Uses arweave-js on a current Node LTS instead of the deprecated
# verses-xyz/arweave-publish-action (Node 16 / marketplace deprecation warnings).
#
# Required repo secret: ARWEAVE_WALLET_KEY — full JSON contents of the Arweave JWK.

name: Publish spec to Arweave

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  # Must match the address derived from repository secret ARWEAVE_WALLET_KEY.
  ARWEAVE_WALLET_ADDRESS: -KIUv_cHtZfbHywqFQ-6Rf7CYzl_99YqNj1nde4uFxQ

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build single-file Markdown bundle (UTF-8)
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
        run: bash scripts/build-spec-artifacts.sh

      # Actions does not create working-directory; mkdir before any step uses it.
      - name: Prepare Arweave client (isolated npm install)
        run: |
          PERMAWEB_DIR="${{ runner.temp }}/permaweb"
          mkdir -p "$PERMAWEB_DIR"
          cd "$PERMAWEB_DIR"
          npm init -y
          npm install arweave@1.15.7
          cp "${{ github.workspace }}/scripts/permaweb-upload.mjs" .

      - name: Upload bundle to Arweave
        id: arweave
        working-directory: ${{ runner.temp }}/permaweb
        env:
          ARWEAVE_WALLET_KEY: ${{ secrets.ARWEAVE_WALLET_KEY }}
          EXPECTED_ARWEAVE_ADDRESS: ${{ env.ARWEAVE_WALLET_ADDRESS }}
        run: node permaweb-upload.mjs "${{ github.workspace }}/spec-permaweb-bundle.md"

      - name: Report transaction id
        run: |
          echo "Arweave txId: ${{ steps.arweave.outputs.tx_id }}"
